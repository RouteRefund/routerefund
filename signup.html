<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create account | RouteRefund</title><link rel="stylesheet" href="styles.css"></head>
<body data-page="signup">
  <main class="authWrap">
    <a class="brand center" href="index.html"><span class="logo">↘</span>RouteRefund</a>
    <form id="signupForm" class="panel authCard">
      <h1>Create account</h1>
      <p class="muted">Start tracking booked flights for possible savings.</p>
      <label>Name<input id="name" autocomplete="name" required></label>
      <label>Email<input id="email" type="email" autocomplete="email" required></label>
      <label>Password<input id="password" type="password" autocomplete="new-password" minlength="8" required></label>
      <label>Re-type password<input id="password2" type="password" autocomplete="new-password" minlength="8" required></label>
      <button class="btn primary full" type="submit">Create account</button>
      <p class="mini center">Already have an account? <a href="login.html">Log in</a></p>
    </form>
  </main>
  <div id="toast" class="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="app.js"></script>
</body></html>
