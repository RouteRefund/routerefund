<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create account • RouteRefund</title><link rel="stylesheet" href="styles.css"></head><body data-page="signup"><nav class="nav"><div class="wrap navin"><a class="brand" href="index.html"><span class="logo">↘</span>RouteRefund</a><div class="links"><a class="btn ghost" href="login.html">Log in</a></div></div></nav><main class="wrap"><section class="auth panel"><h1>Create your RouteRefund account</h1><p class="lead">Then add flights from your private trips page.</p><form id="signupForm"><div class="field"><label>Name</label><input id="name" autocomplete="name" required placeholder="Your name"></div><div class="field"><label>Email</label><input id="email" type="email" autocomplete="email" required placeholder="you@example.com"></div><div class="field"><label>Password</label><input id="password" type="password" autocomplete="new-password" minlength="8" required></div><div class="field"><label>Re-type password</label><input id="password2" type="password" autocomplete="new-password" minlength="8" required></div><button class="btn primary" type="submit">Create account</button></form><p>Already have an account? <a href="login.html"><b>Log in</b></a></p><p class="notice">Passwords are handled by Supabase Auth. RouteRefund does not store your raw password.</p></section></main><div id="toast" class="toast"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="app.js"></script></body></html>
