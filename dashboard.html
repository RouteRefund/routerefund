<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My trips | RouteRefund</title><link rel="stylesheet" href="styles.css"></head>
<body data-page="dashboard">
  <nav class="nav"><div class="wrap navin"><a class="brand" href="index.html"><span class="logo">↘</span>RouteRefund</a><div class="links"><span id="welcome" class="hide-sm muted"></span><button class="btn ghost" data-action="logout">Log out</button></div></div></nav>
  <main class="wrap">
    <section class="section dashHead"><div><span class="eyebrow">Customer dashboard</span><h1>My tracked trips</h1><p class="lead small">Add flights you already booked. RouteRefund will watch for savings opportunities.</p></div></section>
    <section class="grid two align-start">
      <form id="tripForm" class="panel formPanel">
        <h2>Add a booked flight</h2>
        <label>Flight number<input id="flightNo" placeholder="AA 1234" required></label>
        <label>Confirmation number<input id="confirmationNo" placeholder="ABC123" required></label>
        <label>Route<input id="route" placeholder="DFW → LAX" required></label>
        <label>Departure date<input id="travelDate" type="date" required></label>
        <label>Price paid<input id="paid" type="number" min="0" step="0.01" placeholder="325.00" required></label>
        <label>Where did you book?<input id="bookingSource" placeholder="American, Delta, Expedia, etc."></label>
        <label>Notes<textarea id="notes" placeholder="Anything we should know?"></textarea></label>
        <button class="btn primary full" type="submit">Save flight</button>
        <p class="mini">Never include card numbers here. Payment/commission collection will use Stripe later.</p>
      </form>
      <section><div id="trips"></div></section>
    </section>
  </main>
  <div id="toast" class="toast"></div><div id="modal" class="modal"><div id="modalCard" class="modalCard"></div></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="app.js"></script>
</body></html>
